overlay: 1.1.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Terraform generation overlay for planetscale_postgres_bouncer managed and data resources.
  version: 0.0.1
actions:
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post
    description: API operation for managed resource create.
    update:
      x-speakeasy-entity-operation: PostgresBouncer#create
      x-speakeasy-entity-description: >-
        Manage a dedicated PgBouncer for a PlanetScale Postgres branch.
        Connect through the bouncer on port 6432 with the username format
        `username|bouncer-name`. Size, replica, and parameter changes are
        rolled out by provisioning a replacement bouncer and draining
        connections from the old one over 24 hours; a new change cannot be
        applied while a previous one is still rolling out.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.requestBody.content["application/json"].schema
    description: The bouncer name identifies the resource in read, update, and delete paths.
    update:
      required:
        - name

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.requestBody.content["application/json"].schema.properties.name
    description: Practitioner-facing attribute description.
    update:
      description: >-
        The name of the bouncer. Clients connect through the bouncer by
        appending it to the username, e.g. `postgres.abc123|my-bouncer`.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.requestBody.content["application/json"].schema.properties.target
    description: Practitioner-facing attribute description.
    update:
      description: >-
        The servers the bouncer routes connections to: `primary`, `replica`,
        or `replica_az_affinity` (replicas in the same availability zone as
        the bouncer).
      enum:
        - primary
        - replica
        - replica_az_affinity

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.requestBody.content["application/json"].schema.properties.bouncer_size
    description: Practitioner-facing attribute description.
    update:
      description: >-
        The bouncer size, e.g. `PGB_5`, `PGB_10`, `PGB_20`, `PGB_40`,
        `PGB_80`, or `PGB_160`. Defaults to `PGB_5`.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.requestBody.content["application/json"].schema.properties.replicas_per_cell
    description: Practitioner-facing attribute description.
    update:
      description: The number of PgBouncer instances per availability zone. Defaults to 1.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get
    description: API operation for data and managed resource read.
    update:
      x-speakeasy-entity-operation: PostgresBouncer#read
      x-speakeasy-entity-description: Returns information about a dedicated PgBouncer for a PlanetScale Postgres branch.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.parameters[?@.name == 'bouncer']
    description: The bouncer path parameter is the bouncer name.
    update:
      x-speakeasy-match: name

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].delete
    description: API operation for managed resource delete.
    update:
      x-speakeasy-entity-operation: PostgresBouncer#delete

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].delete.parameters[?@.name == 'bouncer']
    description: The bouncer path parameter is the bouncer name.
    update:
      x-speakeasy-match: name

  # Response shaping shared by create and read: the branch object collides
  # with the branch path parameter, and the rich parameters array cannot
  # reconcile with the map-shaped parameters the write endpoints take.
  # bouncer_size and parameter_overrides are returned by the API but not yet
  # published in the upstream schema; parameter_overrides is renamed so reads
  # refresh the parameters attribute defined by the terraform-changes request.
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties
    description: Hide the rich parameters array, which cannot reconcile with the map-shaped request. Add undocumented response fields.
    update:
      parameters:
        x-speakeasy-name-override: parameter_details
        x-speakeasy-terraform-ignore: true
      bouncer_size:
        type: string
        description: >-
          The bouncer size, e.g. `PGB_5`, `PGB_10`, `PGB_20`, `PGB_40`,
          `PGB_80`, or `PGB_160`. Defaults to `PGB_5`.
      parameter_overrides:
        type: object
        additionalProperties:
          type: object
          additionalProperties:
            type: string
        x-speakeasy-name-override: parameters
        description: >-
          PgBouncer parameter overrides, nested by namespace, e.g.
          { pgbouncer = { default_pool_size = "100" } }. Omitted parameters
          are reset to their defaults.
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties
    description: Hide the rich parameters array, which cannot reconcile with the map-shaped request. Add undocumented response fields.
    update:
      parameters:
        x-speakeasy-name-override: parameter_details
        x-speakeasy-terraform-ignore: true
      bouncer_size:
        type: string
        description: >-
          The bouncer size, e.g. `PGB_5`, `PGB_10`, `PGB_20`, `PGB_40`,
          `PGB_80`, or `PGB_160`. Defaults to `PGB_5`.
      parameter_overrides:
        type: object
        additionalProperties:
          type: object
          additionalProperties:
            type: string
        x-speakeasy-name-override: parameters
        description: >-
          PgBouncer parameter overrides, nested by namespace, e.g.
          { pgbouncer = { default_pool_size = "100" } }. Omitted parameters
          are reset to their defaults.

  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.created_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.updated_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.deleted_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.sku
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.branch
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.actor.properties.avatar_url
    description: Trim the actor to its ID, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers"].post.responses["200"].content["application/json"].schema.properties.actor.properties.display_name
    description: Trim the actor to its ID, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.created_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.updated_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.deleted_at
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.sku
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.branch
    description: Trim noisy response field, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.actor.properties.avatar_url
    description: Trim the actor to its ID, following the branch resource attribute conventions.
    remove: true
  - target: $.paths["/organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}"].get.responses["200"].content["application/json"].schema.properties.actor.properties.display_name
    description: Trim the actor to its ID, following the branch resource attribute conventions.
    remove: true

  # Updates go through the undocumented terraform-changes endpoint, which
  # applies bouncer_size, replicas_per_cell, and parameters with replace
  # semantics (omitted values reset to their defaults), returns the resulting
  # resize request, and returns 204 when nothing changed. It is also chained
  # onto create to apply parameters, which the create endpoint does not
  # accept. Resizes are asynchronous, but reads reflect the requested
  # configuration immediately, so no polling is needed.
  - target: $.paths
    description: Add the undocumented bouncer terraform-changes endpoint.
    update:
      /organizations/{organization}/databases/{database}/branches/{branch}/bouncers/{bouncer}/terraform-changes:
        put:
          operationId: apply_postgres_bouncer_terraform_changes
          summary: Apply a Postgres bouncer's size, replicas, and parameters
          tags:
            - Bouncers
          parameters:
            - name: organization
              in: path
              required: true
              description: "Organization name slug from `list_organizations`. Example: `acme`."
              schema:
                type: string
            - name: database
              in: path
              required: true
              description: "Database name slug from `list_databases`. Example: `app-db`."
              schema:
                type: string
            - name: branch
              in: path
              required: true
              description: "Branch name from `list_branches`. Example: `main`."
              schema:
                type: string
            - name: bouncer
              in: path
              required: true
              description: The name of the bouncer
              x-speakeasy-match: name
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  additionalProperties: false
                  properties:
                    bouncer_size:
                      type: string
                      description: >-
                        The bouncer size, e.g. `PGB_5`, `PGB_10`, `PGB_20`,
                        `PGB_40`, `PGB_80`, or `PGB_160`. Defaults to `PGB_5`.
                    replicas_per_cell:
                      type: integer
                      description: The number of PgBouncer instances per availability zone. Defaults to 1.
                    parameters:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                      x-speakeasy-plan-modifiers: WarnOnRemovedParameters
                      description: >-
                        PgBouncer parameter overrides, nested by namespace, e.g.
                        { pgbouncer = { default_pool_size = "100" } }. Omitted parameters
                        are reset to their defaults.
          responses:
            "200":
              description: Returns the resulting bouncer resize request
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: string
                        x-speakeasy-name-override: resize_request_id
                        x-speakeasy-terraform-ignore: schema
                      state:
                        type: string
                        x-speakeasy-name-override: resize_request_state
                        x-speakeasy-terraform-ignore: schema
                    required:
                      - id
                      - state
            "204":
              description: No changes to apply
          x-speakeasy-entity-operation:
            - PostgresBouncer#create#2
            - PostgresBouncer#update
