overlay: 1.1.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Terraform generation overlay for planetscale_branch_vitess managed and data resources.
  version: 0.0.1
actions:
  - target: $.paths['/organizations/{organization}/databases/{database}/branches#vitess'].post
    description: Update operation metadata for Vitess
    update:
      operationId: create_vitess_branch
      summary: Create a Vitess branch
      x-speakeasy-entity-operation: VitessBranch#create
      x-speakeasy-entity-description: Manage a PlanetScale Vitess database branch.

  - target: $.paths['/organizations/{organization}/databases/{database}/branches#vitess'].post.requestBody.content['application/json'].schema.properties.cluster_size
    update:
      x-speakeasy-plan-validators: ClusterSizeValidator

  - target: $.paths['/organizations/{organization}/databases/{database}/branches#vitess'].post.requestBody.content['application/json'].schema.properties.restore_point
    description: Remove restore_point (Postgres-only field)
    remove: true
  - target: $.paths['/organizations/{organization}/databases/{database}/branches#vitess'].post.requestBody.content['application/json'].schema.properties.major_version
    description: Remove major_version (Postgres-only field)
    remove: true

  - target: $.paths['/organizations/{organization}/databases/{database}/branches#vitess'].post.requestBody.content['application/json'].schema.properties
    description: Always send create_database_if_missing=true and kind=mysql so the branch resource transparently creates the database when it does not already exist.
    update:
      create_database_if_missing:
        type: boolean
        const: true
        default: true
        description: Create the database if it does not already exist. The Terraform provider always sends this so that branch resources transparently provision the database on first apply.
        x-speakeasy-terraform-ignore: schema
      kind:
        type: string
        const: mysql
        default: mysql
        description: The kind of database. Always mysql for planetscale_vitess_branch.
        x-speakeasy-terraform-ignore: schema

  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}#vitess'].get
    description: Update operation metadata for Vitess
    update:
      operationId: get_vitess_branch
      summary: Get a Vitess branch
      x-speakeasy-entity-operation:
        - VitessBranch#read
        - entityOperation: VitessBranch#create#2
          options:
            polling:
              name: WaitForReady
      x-speakeasy-entity-description: Returns information about a PlanetScale Vitess database branch.
      x-speakeasy-polling:
        - name: WaitForReady
          limitCount: 900
          successCriteria:
            - condition: $statusCode == 200
            - condition: $response.body#/state == "ready"

  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}#vitess'].patch
    description: Update branch metadata
    update:
      operationId: update_vitess_branch
      summary: Update a Vitess branch
      x-speakeasy-entity-operation: VitessBranch#update

  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}#vitess'].patch.parameters[?@.name == 'branch']
    description: Add x-speakeasy-match to branch parameter
    update:
      x-speakeasy-match: id

  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}#vitess'].patch.requestBody.content['application/json'].schema.properties.new_name
    description: Map new_name to name field from GET response
    update:
      x-speakeasy-name-override: name

  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}#vitess'].delete
    description: Update operation metadata for Vitess
    update:
      operationId: delete_vitess_branch
      summary: Delete a Vitess branch
      x-speakeasy-entity-operation: VitessBranch#delete

