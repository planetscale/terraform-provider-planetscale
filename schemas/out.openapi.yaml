components:
  requestBodies:
    create_traffic_budgetBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Name of the traffic budget
              mode:
                type: string
                enum:
                  - enforce
                  - warn
                  - off
                description: The mode of the traffic budget
              capacity:
                type: integer
                description: The maximum capacity that can be banked, measured as a percentage of seconds of full server usage (0-6000). Unlimited when not set.
              rate:
                type: integer
                description: The rate at which capacity refills, as a percentage of server resources (0-100). Unlimited when not set.
              burst:
                type: integer
                description: The maximum capacity a single query can consume, measured as a percentage of seconds of full server usage (0-6000). Unlimited when not set.
              concurrency:
                type: integer
                description: The percentage of available worker processes this policy can use (0-100). Unlimited when not set.
              warning_threshold:
                type: integer
                description: A percentage of capacity, burst, or concurrency thresholds to emit warnings for enforced budgets (0-100).
              rules:
                type: array
                items:
                  type: string
                description: Array of traffic rules to apply to the budget
    create_backup_policyBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: The name of the backup policy
              target:
                type: string
                enum:
                  - production
                  - development
                description: Whether the policy is for production or development branches
              retention_value:
                type: integer
                description: A number value for the retention period of the backup policy
              retention_unit:
                type: string
                enum:
                  - hour
                  - day
                  - week
                  - month
                  - year
                description: The unit for the retention period of the backup policy
              frequency_value:
                type: integer
                description: A number value for the frequency of the backup policy
              frequency_unit:
                type: string
                enum:
                  - hour
                  - day
                  - week
                  - month
                description: The unit for the frequency of the backup policy
              schedule_time:
                type: string
                description: The time of day that the backup is scheduled, in HH:MM format
              schedule_day:
                type: integer
                description: Day of the week that the backup is scheduled. 0 is Sunday, 6 is Saturday
              schedule_week:
                type: integer
                description: Week of the month that the backup is scheduled. 0 is the first week, 3 is the fourth week
