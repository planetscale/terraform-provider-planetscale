openapi: 3.0.1
info:
  title: Terraform Provider for PlanetScale
  description: |-
    Manage your PlanetScale resources with Terraform
  version: v1
  x-copyright: "&copy; 2026 PlanetScale, Inc."
paths:
  /organizations:
    get:
      tags:
        - Organizations
      operationId: list_organizations
      summary: List organizations
      parameters:
        - name: page
          in: query
          description: If provided, specifies the page offset of returned results
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: If provided, specifies the number of returned results
          schema:
            type: integer
            default: 25
          x-speakeasy-terraform-ignore: true
      responses:
        "200":
          description: Gets the organizations for the current user
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: The response type. Always "list" for paginated responses.
                  current_page:
                    type: integer
                    description: The current page number
                    x-speakeasy-terraform-ignore: true
                  next_page:
                    type: integer
                    description: The next page number, or null when this is the last page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  next_page_url:
                    type: string
                    description: The next page of results, or null when this is the last page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  prev_page:
                    type: integer
                    description: The previous page number, or null when this is the first page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  prev_page_url:
                    type: string
                    description: The previous page of results, or null when this is the first page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The ID for the organization
                        name:
                          type: string
                          description: The name of the organization
                        billing_email:
                          type: string
                          description: The billing email of the organization
                        created_at:
                          type: string
                          description: When the organization was created
                        updated_at:
                          type: string
                          description: When the organization was last updated
                        plan:
                          type: string
                          description: The billing plan of the organization
                        valid_billing_info:
                          type: boolean
                          description: Whether or not the organization's billing information is valid
                        sso:
                          type: boolean
                          description: Whether or not SSO is enabled on the organization
                        sso_directory:
                          type: boolean
                          description: Whether or not the organization uses an SSO directory
                        single_tenancy:
                          type: boolean
                          description: Whether or not the organization has single tenancy enabled
                        managed_tenancy:
                          type: boolean
                          description: Whether or not the organization has managed tenancy enabled
                        has_past_due_invoices:
                          type: boolean
                          description: Whether or not the organization has past due billing invoices.
                          nullable: true
                        database_count:
                          type: integer
                          description: The number of databases in the organization
                        sso_portal_url:
                          type: string
                          description: The URL of the organization's SSO portal.
                          nullable: true
                        features:
                          type: object
                          additionalProperties: true
                          description: Features that can be enabled on the organization
                        idp_managed_roles:
                          type: boolean
                          description: Whether or not the IdP provider is be responsible for managing roles in PlanetScale
                        invoice_budget_amount:
                          type: string
                          description: The expected monthly budget for the organization
                        keyspace_shard_limit:
                          type: integer
                          description: The keyspace shard limit for the organization
                        has_card:
                          type: boolean
                          description: Whether or not the organization has a payment method on file
                        payment_info_required:
                          type: boolean
                          description: Whether or not the organization requires payment information
                      required:
                        - id
                        - name
                        - billing_email
                        - created_at
                        - updated_at
                        - plan
                        - valid_billing_info
                        - sso
                        - sso_directory
                        - single_tenancy
                        - managed_tenancy
                        - database_count
                        - features
                        - idp_managed_roles
                        - invoice_budget_amount
                        - keyspace_shard_limit
                        - has_card
                        - payment_info_required
                required:
                  - type
                  - current_page
                  - next_page
                  - next_page_url
                  - prev_page
                  - prev_page_url
                  - data
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      description: |-
        When using a service token, returns the list of organizations the service token has access to. When using an OAuth token, returns the list of organizations the user has access to.
        ### Authorization
        A   OAuth token must have at least one of the following   scopes in order to use this API endpoint:

        **OAuth Scopes**

         | Resource | Scopes |
        | :------- | :---------- |
        | User | `read_organizations` |
      x-speakeasy-entity-operation: Organizations#read
      x-speakeasy-entity-description: Returns information about accessible PlanetScale organizations.
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
        outputs:
          results: $.data
  /organizations/{organization}:
    get:
      tags:
        - Organizations
      operationId: get_organization
      summary: Get an organization
      parameters:
        - name: organization
          in: path
          required: true
          description: "Organization name slug from `list_organizations`. Example: `acme`."
          schema:
            type: string
      responses:
        "200":
          description: Returns an organization
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID for the organization
                  name:
                    type: string
                    description: The name of the organization
                  billing_email:
                    type: string
                    description: The billing email of the organization
                  created_at:
                    type: string
                    description: When the organization was created
                  updated_at:
                    type: string
                    description: When the organization was last updated
                  plan:
                    type: string
                    description: The billing plan of the organization
                  valid_billing_info:
                    type: boolean
                    description: Whether or not the organization's billing information is valid
                  sso:
                    type: boolean
                    description: Whether or not SSO is enabled on the organization
                  sso_directory:
                    type: boolean
                    description: Whether or not the organization uses an SSO directory
                  single_tenancy:
                    type: boolean
                    description: Whether or not the organization has single tenancy enabled
                  managed_tenancy:
                    type: boolean
                    description: Whether or not the organization has managed tenancy enabled
                  has_past_due_invoices:
                    type: boolean
                    description: Whether or not the organization has past due billing invoices.
                    nullable: true
                  database_count:
                    type: integer
                    description: The number of databases in the organization
                  sso_portal_url:
                    type: string
                    description: The URL of the organization's SSO portal.
                    nullable: true
                  features:
                    type: object
                    additionalProperties: true
                    description: Features that can be enabled on the organization
                  idp_managed_roles:
                    type: boolean
                    description: Whether or not the IdP provider is be responsible for managing roles in PlanetScale
                  invoice_budget_amount:
                    type: string
                    description: The expected monthly budget for the organization
                  keyspace_shard_limit:
                    type: integer
                    description: The keyspace shard limit for the organization
                  has_card:
                    type: boolean
                    description: Whether or not the organization has a payment method on file
                  payment_info_required:
                    type: boolean
                    description: Whether or not the organization requires payment information
                required:
                  - id
                  - name
                  - billing_email
                  - created_at
                  - updated_at
                  - plan
                  - valid_billing_info
                  - sso
                  - sso_directory
                  - single_tenancy
                  - managed_tenancy
                  - database_count
                  - features
                  - idp_managed_roles
                  - invoice_budget_amount
                  - keyspace_shard_limit
                  - has_card
                  - payment_info_required
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      description: |-
        ### Authorization
        A service token or OAuth token must have at least one of the following access or scopes in order to use this API endpoint:

        **Service Token Accesses**
         `read_organization`

        **OAuth Scopes**

         | Resource | Scopes |
        | :------- | :---------- |
        | User | `read_organizations` |
        | Organization | `read_organization` |
      x-speakeasy-entity-operation: Organization#read
      x-speakeasy-entity-description: Returns information about a PlanetScale organization.
  /organizations/{organization}/audit-log: {}
  /organizations/{organization}/cluster-size-skus: {}
  /organizations/{organization}/databases:
    get:
      tags:
        - Databases
      operationId: list_databases
      summary: List databases
      parameters:
        - name: organization
          in: path
          required: true
          description: "Organization name slug from `list_organizations`. Example: `acme`."
          schema:
            type: string
        - name: q
          in: query
          description: Search term to filter databases by name
          schema:
            type: string
        - name: page
          in: query
          description: If provided, specifies the page offset of returned results
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: If provided, specifies the number of returned results
          schema:
            type: integer
            default: 25
          x-speakeasy-terraform-ignore: true
      responses:
        "200":
          description: Retrieves the databases for an organization
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: The response type. Always "list" for paginated responses.
                  current_page:
                    type: integer
                    description: The current page number
                    x-speakeasy-terraform-ignore: true
                  next_page:
                    type: integer
                    description: The next page number, or null when this is the last page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  next_page_url:
                    type: string
                    description: The next page of results, or null when this is the last page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  prev_page:
                    type: integer
                    description: The previous page number, or null when this is the first page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  prev_page_url:
                    type: string
                    description: The previous page of results, or null when this is the first page
                    nullable: true
                    x-speakeasy-terraform-ignore: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The ID of the database
                        url:
                          type: string
                          description: The URL to the database API endpoint
                        branches_url:
                          type: string
                          description: The URL to retrieve this database's branches via the API
                        branches_count:
                          type: integer
                          description: The total number of database branches
                        open_schema_recommendations_count:
                          type: integer
                          description: The total number of schema recommendations
                        development_branches_count:
                          type: integer
                          description: The total number of database development branches
                        production_branches_count:
                          type: integer
                          description: The total number of database production branches
                        issues_count:
                          type: integer
                          description: The total number of ongoing issues within a database
                          nullable: true
                        multiple_admins_required_for_deletion:
                          type: boolean
                          description: If the database requires multiple admins for deletion
                        ready:
                          type: boolean
                          description: If the database is ready to be used
                        at_backup_restore_branches_limit:
                          type: boolean
                          description: If the database has reached its backup restored branch limit
                        at_development_branch_usage_limit:
                          type: boolean
                          description: If the database has reached its development branch limit
                        data_import:
                          type: object
                          properties:
                            state:
                              type: string
                              description: State of the data import
                            import_check_errors:
                              type: string
                              description: Errors encountered during the import check
                            started_at:
                              type: string
                              description: When the import started
                              nullable: true
                            finished_at:
                              type: string
                              description: When the import finished
                              nullable: true
                            data_source:
                              type: object
                              properties:
                                hostname:
                                  type: string
                                  description: Hostname of the data source
                                port:
                                  type: integer
                                  description: Port of the data source
                                database:
                                  type: string
                                  description: Database name of the data source
                              required:
                                - hostname
                                - port
                                - database
                          required:
                            - state
                            - import_check_errors
                            - started_at
                            - finished_at
                            - data_source
                          nullable: true
                        region:
                          type: object
                          properties:
                            id:
                              type: string
                              description: The ID of the region
                            provider:
                              type: string
                              description: Provider for the region (ex. AWS)
                            enabled:
                              type: boolean
                              description: Whether or not the region is currently active
                            public_ip_addresses:
                              items:
                                type: string
                              type: array
                              description: Public IP addresses for the region
                            display_name:
                              type: string
                              description: Name of the region
                            location:
                              type: string
                              description: Location of the region
                            slug:
                              type: string
                              description: The slug of the region
                            current_default:
                              type: boolean
                              description: True if the region is the default for new branch creation
                            mysql_supported:
                              type: boolean
                              description: Whether the region supports MySQL/Vitess databases
                            postgresql_supported:
                              type: boolean
                              description: Whether the region supports PostgreSQL databases
                          required:
                            - id
                            - provider
                            - enabled
                            - public_ip_addresses
                            - display_name
                            - location
                            - slug
                            - current_default
                            - mysql_supported
                            - postgresql_supported
                        html_url:
                          type: string
                          description: The URL to see this database's branches in the web UI
                        name:
                          type: string
                          description: Name of the database
                        state:
                          type: string
                          enum:
                            - pending
                            - importing
                            - sleep_in_progress
                            - sleeping
                            - awakening
                            - import_ready
                            - ready
                          description: State of the database
                        sharded:
                          type: boolean
                          description: If the database is sharded
                        default_branch_shard_count:
                          type: integer
                          description: Number of shards in the default branch
                        default_branch_read_only_regions_count:
                          type: integer
                          description: Number of read only regions in the default branch
                        default_branch_table_count:
                          type: integer
                          description: Number of tables in the default branch schema
                        default_branch:
                          type: string
                          description: The default branch for the database
                        require_approval_for_deploy:
                          type: boolean
                          description: Whether an approval is required to deploy schema changes to this database
                        resizing:
                          type: boolean
                          description: True if a branch is currently resizing
                        resize_queued:
                          type: boolean
                          description: True if a branch has a queued resize request
                        allow_data_branching:
                          type: boolean
                          description: Whether seeding branches with data is enabled for all branches
                        foreign_keys_enabled:
                          type: boolean
                          description: Whether foreign key constraints are enabled
                        automatic_migrations:
                          type: boolean
                          description: Whether to automatically manage Rails migrations during deploy requests.
                          nullable: true
                        restrict_branch_region:
                          type: boolean
                          description: Whether to restrict branch creation to one region
                        insights_raw_queries:
                          type: boolean
                          description: Whether raw SQL queries are collected
                        plan:
                          type: string
                          description: The database plan
                        insights_enabled:
                          type: boolean
                          description: True if query insights is enabled for the database
                        production_branch_web_console:
                          type: boolean
                          description: Whether web console is enabled for production branches
                        migration_table_name:
                          type: string
                          description: Table name to use for copying schema migration data.
                          nullable: true
                        migration_framework:
                          type: string
                          description: Framework used for applying migrations.
                          nullable: true
                        created_at:
                          type: string
                          description: When the database was created
                        updated_at:
                          type: string
                          description: When the database was last updated
                        schema_last_updated_at:
                          type: string
                          description: When the default branch schema was last changed.
                          nullable: true
                        kind:
                          type: string
                          enum:
                            - mysql
                            - postgresql
                          description: The kind of database
                      required:
                        - id
                        - url
                        - branches_url
                        - branches_count
                        - open_schema_recommendations_count
                        - development_branches_count
                        - production_branches_count
                        - multiple_admins_required_for_deletion
                        - ready
                        - at_backup_restore_branches_limit
                        - at_development_branch_usage_limit
                        - region
                        - html_url
                        - name
                        - state
                        - sharded
                        - default_branch_shard_count
                        - default_branch_read_only_regions_count
                        - default_branch_table_count
                        - default_branch
                        - require_approval_for_deploy
                        - resizing
                        - resize_queued
                        - config_changing
                        - config_change_queued
                        - allow_data_branching
                        - foreign_keys_enabled
                        - restrict_branch_region
                        - insights_raw_queries
                        - plan
                        - insights_enabled
                        - production_branch_web_console
                        - created_at
                        - updated_at
                        - schema_last_updated_at
                        - kind
                required:
                  - type
                  - current_page
                  - next_page
                  - next_page_url
                  - prev_page
                  - prev_page_url
                  - data
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      description: |-
        ### Authorization
        A service token or OAuth token must have at least one of the following access or scopes in order to use this API endpoint:

        **Service Token Accesses**
         `read_database`, `delete_database`, `write_database`, `read_branch`, `delete_branch`, `create_branch`, `delete_production_branch`, `connect_branch`, `connect_production_branch`, `connect_production_read_only_branch`, `delete_branch_password`, `delete_production_branch_password`, `delete_production_read_only_branch_password`, `read_deploy_request`, `create_deploy_request`, `approve_deploy_request`, `read_comment`, `create_comment`, `restore_backup`, `restore_production_branch_backup`, `read_backups`, `write_backups`, `delete_backups`, `delete_production_branch_backups`, `write_branch_vschema`, `write_production_branch_vschema`

        **OAuth Scopes**

         | Resource | Scopes |
        | :------- | :---------- |
        | Organization | `read_databases` |
      x-speakeasy-entity-operation: Databases#read
      x-speakeasy-entity-description: Returns information about accessible PlanetScale databases.
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
        outputs:
          results: $.data
