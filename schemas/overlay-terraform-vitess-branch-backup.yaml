    update:
      operationId: create_vitess_branch_backup
      summary: Create a Vitess branch backup
      x-speakeasy-entity-operation: VitessBranchBackup#create
      x-speakeasy-entity-description: Manage a PlanetScale Vitess database branch backup.
  - target: $.paths['/organizations/{organization}/databases/{database}/branches/{branch}/backups/{id}#vitess'].get
